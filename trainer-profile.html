<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Můj trenérský profil</title>
  
  <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/assets/favicon/site.webmanifest">

  <link rel="stylesheet" href="style_main.css"/>
  <link rel="stylesheet" href="trainer-profile.css"/>
  <link rel="stylesheet" href="navbar.css">
</head>
<body>
  <!-- Navbar (isolated) -->
  <nav class="cznav" aria-label="Hlavní navigace">
    <!-- Logo -->
    <div class="cznav__logo">
      <a href="index.html">
        <img src="assets/CZTrainersNew.png" alt="CZTRAINERS Logo" />
      </a>
    </div>
    <!-- Inline links (desktop only — hidden on mobile via CSS) -->
    <div class="cznav__links" aria-label="Hlavní menu">
      <a href="index.html"          class="cznav__navlink">Domů</a>
      <a href="mapa-treneru.html"   class="cznav__navlink">Mapa Trenérů</a>
      <a href="o-nas.html"          class="cznav__navlink">O nás</a>
    </div>
    <!-- Right cluster: pill + theme + hamburger -->
    <div class="cznav__right">
      <!-- Profile / Login pill (controlled by auth-navbar.js) -->
      <a id="profilePill" class="cznav__pill" href="register.html" aria-label="Přihlásit / registrace">
        <!-- user icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M6 20a6 6 0 0112 0"/>
        </svg>
        <span id="pillText">Přihlásit se</span>
      </a>
      <!-- Theme toggle — SVG icons swapped by JS below -->
      <button id="themeToggle" class="cznav__theme" type="button" aria-label="Přepnout motiv">
        <!-- Sun (shown in dark mode → click to go light) -->
        <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="display:none" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon (shown in light mode → click to go dark) -->
        <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
        </svg>
      </button>
      <!-- Hamburger (mobile only — hidden on desktop via CSS) -->
      <button id="hamburger" class="cznav__hamburger" type="button" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <!-- Dropdown / mobile sheet -->
    <div id="navLinks" class="cznav__menu" role="menu" aria-label="Navigace">
      <a href="index.html"         class="cznav__link">Domů</a>
      <a href="mapa-treneru.html"  class="cznav__link">Mapa Trenérů</a>
      <a href="o-nas.html"         class="cznav__link">O nás</a>
      <a href="login.html"         class="cznav__link" id="loginBtn">Přihlášení</a>
      <a href="#"                  class="cznav__link" id="logoutBtn" style="display:none">Odhlásit se</a>
    </div>
  </nav>

  <main class="container">
    <!-- Header card (pfp + name + 3 CTA) -->
    <section class="me-header">
      <img id="meAvatar" class="me-avatar" src="https://placehold.co/240x240?text=Profil" alt="Profilová fotka">
      <div class="me-info">
        <h1 id="meName">Moje jméno</h1>
        <div class="me-actions">
          <a class="btn-cta" href="trainer-profile-edit.html">Upravit profil</a>
          <a class="btn-cta" href="account.html">Účet &amp; zabezpečení</a>
          <button id="btnLogout" class="btn-cta danger">Odhlásit se</button>
        </div>
      </div>
    </section>

    <hr class="me-sep">

    <h2 class="preview-title">Náhled vašeho profilu</h2>
    <div id="profileCard"></div>
  </main>

  <!-- TRAINER what REVIEWS (read-only with verify) -->
  <section id="trainerReviews" class="reviews-container" style="margin-top:2rem;">
    <h2>Recenze vašich klientů</h2>
    <div id="trainerReviewsList" class="reviews-list"></div>
  </section>

  <!-- Firebase + data -->
<script type="module">
  import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, get, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyASK2terL9kejt9JTJr944WCFYzRkK8AGU",
    authDomain: "cztrainers-dat1.firebaseapp.com",
    databaseURL: "https://cztrainers-dat1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "cztrainers-dat1",
    storageBucket: "cztrainers-dat1.appspot.com",
    messagingSenderId: "369200533487",
    appId: "1:369200533487:web:eb31707c0de4bda2b8f01a"
  };

  const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getDatabase(app);

  const profileCard = document.getElementById("profileCard");
  const meNameEl    = document.getElementById("meName");
  const meAvatarEl  = document.getElementById("meAvatar");
  const pillText    = document.getElementById("pillText");
  const profilePill = document.getElementById("profilePill");
  const loginBtn    = document.getElementById("loginBtn");
  const logoutBtn   = document.getElementById("logoutBtn");
  const btnLogout   = document.getElementById("btnLogout");

  function locationText(loc) {
    if (!loc) return "";
    if (typeof loc === "string") return loc;
    const city   = (loc.city   || "").trim();
    const region = (loc.region || "").trim();
    return city && region ? `${city}, ${region}` : (city || region || "");
  }

  function socialsFrom(user){
    const s = user.socials || {};
    return {
      instagram: user.instagram || s.instagram || "",
      facebook:  user.facebook  || s.facebook  || "",
      tiktok:    user.tiktok    || s.tiktok    || ""
    };
  }

  function renderSocialLinks(socials = {}) {
    const platforms = {
      instagram: v => v.startsWith("http") ? v : `https://instagram.com/${v.replace(/^@/,"")}`,
      facebook:  v => v.startsWith("http") ? v : `https://facebook.com/${v.replace(/^@/,"")}`,
      tiktok:    v => v.startsWith("http") ? v : `https://tiktok.com/@${v.replace(/^@/,"")}`
    };
    let html = "";
    for (const k in platforms){
      const val = (socials[k]||"").trim();
      if (!val) continue;
      const link = platforms[k](val);
      const label = val.startsWith("http") ? val : `@${val.replace(/^@/,"")}`;
      html += `<a href="${link}" target="_blank" class="social-tag">${k} ${label}</a>`;
    }
    return html || "<p>Žádné sociální sítě</p>";
  }

  function renderPreview(user){
    const specs = Array.isArray(user.specializations) ? user.specializations
                 : (typeof user.specializations === 'string' ? user.specializations.split(',').map(s=>s.trim()).filter(Boolean) : []);
    const langs = Array.isArray(user.languages) ? user.languages
                 : (typeof user.languages === 'string' ? user.languages.split(',').map(l=>l.trim()).filter(Boolean) : []);
    const socials = socialsFrom(user);

    profileCard.innerHTML = `
      <div class="profile-container">
        <div class="profile-left">
          <img class="profile-avatar" src="${user.profilePicture || 'https://placehold.co/300x300?text=Profil'}" alt="Profilová fotka">
          <h2>${user.name || "Neznámý"} ${user.prijmeni || ""}</h2>
          <p><strong>📍 Lokalita:</strong> ${locationText(user.location) || "-"}</p>
          <p><strong>📞 Telefon:</strong> ${user.phone || "-"}</p>
          <p><strong>📧 Email:</strong> ${user.email || "-"}</p>
          <p><strong>🌐 Moje sociální sítě:</strong></p>
          <div class="socials-container">
            ${renderSocialLinks(socials)}
          </div>
          <p><strong>Galerie 📸</strong></p>
          <div id="profileGallery" class="profile-gallery" aria-label="Galerie trenéra" data-owner-id="${user.uid || ''}"></div>
        </div>

        <div class="profile-right">
          <p class="bio-text"><strong>🧍‍♂️ O mně:</strong><br> ${user.bio || "-"}</p>

          <p><strong>💪 Specializace:</strong></p>
          <div class="tag-list">
            ${specs.map(s=>`<span class="tag">${s}</span>`).join("") || "-"}
          </div>

          <p><strong>🗣️ Jazyky:</strong></p>
          <div class="tag-list">
            ${langs.map(l=>`<span class="tag">${l}</span>`).join("") || "-"}
          </div>

          <p><strong>🧠 Zkušenosti:</strong> ${user.experience || "-"} let</p>
          <p class="pricing-text"><strong>💰 Cenník:</strong><br> ${user.pricing || "-"}</p>
        </div>
      </div>
    `;
  }

  // ---------- Trainer's own reviews (read-only + verify toggle) ----------
  function starsLine(n){ n=Math.max(1,Math.min(5,Number(n)||0)); return "★".repeat(n)+"☆".repeat(5-n); }

  function renderTrainerReviews(trainerId){
    const listEl = document.getElementById("trainerReviewsList");
    if (!listEl) return;

    const rRef = ref(db, `reviews/${trainerId}`);
    onValue(rRef, (snap)=>{
      listEl.innerHTML = "";
      if (!snap.exists()){
        listEl.innerHTML = "<p>Zatím žádné recenze.</p>";
        return;
      }
      const data = snap.val();
      Object.entries(data).forEach(([reviewerId, r])=>{
        const card = document.createElement("div");
        card.className = "review-card";

        const badge = r.verified
          ? '<span class="badge badge--ok" title="Ověřená recenze">✔ Ověřeno</span>'
          : '<span class="badge badge--pending" title="Čeká na ověření">Neověřeno</span>';

        card.innerHTML = `
          <div class="review-top">
            <div class="review-stars">${starsLine(r.rating)}</div>
            ${badge}
            <button class="btn-verify" data-reviewer="${reviewerId}" data-state="${r.verified?1:0}">
              ${r.verified ? "Zrušit ověření" : "Ověřit recenzi"}
            </button>
          </div>
          <p class="review-text">"${r.text}"</p>
          <p class="review-meta">— ${r.authorName || "Uživatel"}, ${new Date(r.createdAt||Date.now()).toLocaleDateString("cs-CZ")}</p>
        `;
        listEl.appendChild(card);
      });

      // toggle verified (only flips the boolean field)
      listEl.querySelectorAll(".btn-verify").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const reviewerId = btn.getAttribute("data-reviewer");
          const current = btn.getAttribute("data-state")==="1";
          try{
            await set(ref(db, `reviews/${trainerId}/${reviewerId}/verified`), !current);
          }catch(e){
            console.error("Verify toggle denied:", e);
            alert("Nelze změnit stav ověření (práva k databázi).");
          }
        });
      });
    }, (err)=>{
      console.error("Reviews read error:", err);
      listEl.innerHTML = "<p>Nepodařilo se načíst recenze.</p>";
    });
  }
  // ----------------------------------------------------------------------

  (function(){
    const CLOUD = window.CLOUDINARY_CLOUD || "dkt3pdcbe"; // <-- set your cloud name or set window.CLOUDINARY_CLOUD earlier

    function thumbUrl(pid){ return `https://res.cloudinary.com/${CLOUD}/image/upload/c_fill,w_640,h_480,f_auto,q_auto/${encodeURIComponent(pid)}.jpg`; }
    function fullUrl(pid){ return `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/${encodeURIComponent(pid)}.jpg`; }

    // IntersectionObserver for lazy-loading images (thumbnails)
    const observer = 'IntersectionObserver' in window ? new IntersectionObserver((entries, obs) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const img = e.target;
          const src = img.datasetSrc || img.dataset.src;
          if (src) { img.src = src; img.removeAttribute('data-src'); img.removeAttribute('data-srcset'); }
          obs.unobserve(img);
        }
      });
    }, { rootMargin: "200px 0px 200px 0px", threshold: 0.01 }) : null;

    // render gallery into container; gallery param normalized
    window.initProfileGallery = function(gallery = [], ownerUid = "") {
      const container = document.getElementById('profileGallery');
      if (!container) return;
      // normalize items to { publicId, url }
      const items = (gallery || []).map(it => {
        if (!it) return null;
        if (typeof it === 'string') return { publicId: it, url: null };
        return { publicId: it.publicId || it.public_id || null, url: it.url || it.secure_url || null };
      }).filter(Boolean);

      container.innerHTML = '';

      if (items.length === 0) {
        // placeholder. if owner, show upload CTA (optional)
        const ph = document.createElement('div');
        ph.className = 'thumb placeholder';
        ph.innerHTML = ownerUid && auth && auth.currentUser && auth.currentUser.uid === ownerUid
          ? '<div>No photos yet — <a href="trainer-profile-edit.html">Add gallery</a></div>'
          : '<div>No photos</div>';
        container.appendChild(ph);
        return;
      }

      // show first 4 slots (3 thumbs + last maybe +N overlay)
      const visible = Math.min(4, items.length);
      for (let i=0;i<visible;i++){
        const it = items[i];
        const div = document.createElement('div');
        div.className = 'thumb';
        div.tabIndex = 0;
        div.dataset.index = i;

        const img = document.createElement('img');
        img.alt = `Foto ${i+1}`;
        img.loading = 'lazy';
        // set data-src for lazy load via observer
        const src = it.publicId ? thumbUrl(it.publicId) : (it.url || '');
        img.dataset.src = src;
        if (observer) observer.observe(img);
        else img.src = src;

        div.appendChild(img);
        container.appendChild(div);

        div.addEventListener('click', ()=>openLightbox(i, items));
        div.addEventListener('keydown', e => { if (e.key === 'Enter') openLightbox(i, items); });
      }

      if (items.length > 4) {
        // show +N overlay on last thumb (we attach to last thumbnail spot)
        // replace last thumb with a mixed overlay showing +N but still load thumbnail behind it
        const index = 3;
        const last = container.children[index];
        last.classList.add('more');
        const overlay = document.createElement('div');
        overlay.className = 'count-overlay';
        overlay.textContent = `+${items.length - 3}`;
        last.appendChild(overlay);
        last.addEventListener('click', ()=>openLightbox(index, items));
      }
    };

    // LIGHTBOX implementation
    const lb = document.createElement('div');
    lb.id = 'pg-lightbox';
    lb.innerHTML = `
      <div class="lb-inner" role="dialog" aria-modal="true" aria-label="Galerie">
        <button class="pg-lb-close" aria-label="Zavřít">✕</button>
        <button class="pg-lb-btn pg-lb-prev" aria-label="Předchozí">◀</button>
        <img id="pg-lb-img" src="" alt="Galerie obrázek" />
        <button class="pg-lb-btn pg-lb-next" aria-label="Další">▶</button>
      </div>
    `;
    document.body.appendChild(lb);
    const lbImg = lb.querySelector('#pg-lb-img');
    const closeBtn = lb.querySelector('.pg-lb-close');
    const prevBtn = lb.querySelector('.pg-lb-prev');
    const nextBtn = lb.querySelector('.pg-lb-next');
    let lbItems = [];
    let lbIndex = 0;

    function openLightbox(startIndex, items){
      lbItems = items || lbItems;
      lbIndex = Math.max(0, Math.min(startIndex, lbItems.length - 1));
      const cur = lbItems[lbIndex];
      lbImg.src = cur.publicId ? fullUrl(cur.publicId) : (cur.url || '');
      lb.classList.add('show');
      // lock scroll
      document.documentElement.style.overflow = 'hidden';
      // focus close button for accessibility
      closeBtn.focus();
    }
    function closeLightbox(){ lb.classList.remove('show'); lbImg.src = ''; document.documentElement.style.overflow = ''; }
    function showNext(){ lbIndex = (lbIndex + 1) % lbItems.length; openLightbox(lbIndex); }
    function showPrev(){ lbIndex = (lbIndex - 1 + lbItems.length) % lbItems.length; openLightbox(lbIndex); }

    closeBtn.addEventListener('click', closeLightbox);
    nextBtn.addEventListener('click', showNext);
    prevBtn.addEventListener('click', showPrev);
    document.addEventListener('keydown', (e)=>{
      if (!lb.classList.contains('show')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') showNext();
      if (e.key === 'ArrowLeft') showPrev();
    });

    // basic touch swipe for lightbox image
    let startX = 0;
    lbImg.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
    lbImg.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      if (dx > 40) showPrev();
      if (dx < -40) showNext();
      startX = 0;
    });

    // expose helper globally
    window.__initProfileGallery = window.initProfileGallery;
  })();

  onAuthStateChanged(auth, async (u)=>{
    // default header/pill
    pillText.textContent = u?.emailVerified ? (u.displayName || "Profil") : "Login";
    profilePill.href = u?.emailVerified ? "trainer-profile.html" : "register.html";

    if (!u || !u.emailVerified){
      if (loginBtn)  loginBtn.style.display = "inline-block";
      if (logoutBtn) logoutBtn.style.display = "none";
      meNameEl.textContent = "Nejste přihlášen/a";
      return;
    }

    if (loginBtn)  loginBtn.style.display = "none";
    if (logoutBtn) logoutBtn.style.display = "inline-block";

    const snap = await get(ref(db, "users/" + u.uid));
    const data = snap.exists() ? snap.val() : { name: u.displayName || "", email: u.email };

    const fullName = `${data.name || ""} ${data.prijmeni || ""}`.trim() || (u.displayName || "Uživatel");
    meNameEl.textContent = fullName;
    pillText.textContent = fullName;
    meAvatarEl.src = data.profilePicture || "https://placehold.co/240x240?text=Profil";

    // preview card
    renderPreview({ ...data, email: data.email || u.email });
    initProfileGallery(data.gallery || data._gallery || [], u.uid);


    // load my reviews + enable verify toggle
    renderTrainerReviews(u.uid);
  });

  function doLogout(e){
    e?.preventDefault();
    signOut(auth).then(()=>window.location.href="index.html")
                 .catch(err=>alert("Chyba při odhlášení: " + err.message));
  }
  document.getElementById("logoutBtn")?.addEventListener("click", doLogout);
  document.getElementById("btnLogout")?.addEventListener("click", doLogout);
</script>

  <!-- Auth-driven navbar visibility (your existing helper) -->
  <script type="module" src="auth-navbar.js"></script>
</body>
</html>
