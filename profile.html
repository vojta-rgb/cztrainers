<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profil trenéra</title>
  
  <link rel="icon" href="/assets/favicon/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/assets/favicon/site.webmanifest">

  <link rel="stylesheet" href="style_main.css"/>
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
  <!-- Navbar (isolated) -->
  <nav class="cznav" aria-label="Hlavní navigace">
    <!-- Logo -->
    <div class="cznav__logo">
      <a href="index.html">
        <img src="assets/CZTrainersNew.png" alt="CZTRAINERS Logo" />
      </a>
    </div>
    <!-- Inline links (desktop only — hidden on mobile via CSS) -->
    <div class="cznav__links" aria-label="Hlavní menu">
      <a href="index.html"          class="cznav__navlink">Domů</a>
      <a href="mapa-treneru.html"   class="cznav__navlink">Mapa Trenérů</a>
      <a href="o-nas.html"          class="cznav__navlink">O nás</a>
    </div>
    <!-- Right cluster: pill + theme + hamburger -->
    <div class="cznav__right">
      <!-- Profile / Login pill (controlled by auth-navbar.js) -->
      <a id="profilePill" class="cznav__pill" href="register.html" aria-label="Přihlásit / registrace">
        <!-- user icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M6 20a6 6 0 0112 0"/>
        </svg>
        <span id="pillText">Přihlásit se</span>
      </a>
      <!-- Theme toggle — SVG icons swapped by JS below -->
      <button id="themeToggle" class="cznav__theme" type="button" aria-label="Přepnout motiv">
        <!-- Sun (shown in dark mode → click to go light) -->

            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="display:none" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1"  x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22"  x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1"  y1="12" x2="3"  y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
          <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon (shown in light mode → click to go dark) -->
        <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
        </svg>
      </button>
      <!-- Hamburger (mobile only — hidden on desktop via CSS) -->
      <button id="hamburger" class="cznav__hamburger" type="button" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <!-- Dropdown / mobile sheet -->
    <div id="navLinks" class="cznav__menu" role="menu" aria-label="Navigace">
      <a href="index.html"         class="cznav__link">Domů</a>
      <a href="mapa-treneru.html"  class="cznav__link">Mapa Trenérů</a>
      <a href="o-nas.html"         class="cznav__link">O nás</a>
      <a href="login.html"         class="cznav__link" id="loginBtn">Přihlášení</a>
      <a href="#"                  class="cznav__link" id="logoutBtn" style="display:none">Odhlásit se</a>
    </div>
  </nav>
  
  <!-- UPPER CONTAINER: title + profile card + actions -->
  <div class="container">
    <h1 class="animate__animated animate__fadeInUp">Profil uživatele</h1>

    <!-- JS fills this with the profile HTML -->
    <div id="profileCard" class="profilecard"></div>

    <!-- Actions live inside the same top container -->
    <div id="profileActions" class="profile-actions">
      <button id="btnBack" class="action-btn action-btn--ghost" type="button" title="Zpět na seznam trenérů">
        Zpět na trenéry
      </button>

      <button id="btnShowReviews" class="action-btn action-btn--primary" type="button" title="Skočit na recenze">
        Zobrazit recenze
      </button>

      <button id="btnFav" class="action-btn action-btn--heart" type="button" title="Uložit trenéra do oblíbených">
        <span class="heart" aria-hidden="true">♡</span>
        <span class="label">Uložit</span>
        <span class="count" id="favCount">0</span>
      </button>

      <button id="btnReportTrainer" class=" action-btn action-btn--ghost" type="button" title="Nahlásit trenéra" >
      🚩 Nahlásit trenéra
      </button>

      <!-- New: open map centered on this trainer -->
      <button id="btnOpenOnMap" class="action-btn action-btn--primary action-btn--wide" type="button" title="Zobrazit trenéra na mapě">
        📍 Zobrazit na mapě
      </button>
    </div>
  </div>

  <!-- REVIEWS CONTAINER -->
  <div class="container">
    <!-- REVIEW SYSTEM START -->
    <div id="reviewsSection" class="reviews-container">
      <h2>Recenze</h2>
      <div id="reviewsList" class="reviews-list"></div>

      <div id="reviewFormContainer" class="review-form-container" style="display:none;">
        <label for="reviewRating">Hodnocení:</label>
        <div id="starRating" class="star-rating">
          <span data-value="1">★</span>
          <span data-value="2">★</span>
          <span data-value="3">★</span>
          <span data-value="4">★</span>
          <span data-value="5">★</span>
        </div>

        <textarea id="reviewText" placeholder="Napište svou recenzi..." rows="4" maxlength="1000"></textarea>
        <label class="anon-row"><input type="checkbox" id="reviewAnon"> Odeslat anonymně</label>
        <button id="submitReview" class="btn primary">Odeslat recenzi</button>
      </div>
      <p id="reviewNotice" class="small"></p>
    </div>
    <!-- REVIEW SYSTEM END -->
  </div>

  <div id="toast" class="toast"></div>

  <div id="reportModal" class="report-modal hidden">
    <div class="report-sheet">
      <h3>Nahlásit recenzi</h3>

      <form id="reportForm">
        <div id="reportReasons"></div>

        <textarea
          id="reportDescription"
          placeholder="Volitelný popis (max. 300 znaků)"
          maxlength="300"
        ></textarea>

        <div class="report-actions">
          <button type="button" id="cancelReport">Zrušit</button>
          <button type="submit">Odeslat</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    /* ===== Firebase imports ===== */
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, get, set, onValue, runTransaction, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    /* ===== Firebase config ===== */
    const firebaseConfig = {
      apiKey: "AIzaSyASK2terL9kejt9JTJr944WCFYzRkK8AGU",
      authDomain: "cztrainers-dat1.firebaseapp.com",
      databaseURL: "https://cztrainers-dat1-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "cztrainers-dat1",
      storageBucket: "cztrainers-dat1.appspot.com",
      messagingSenderId: "369200533487",
      appId: "1:369200533487:web:eb31707c0de4bda2b8f01a"
    };

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db  = getDatabase(app);
    const auth = getAuth(app);

    /* ===== URL & DOM refs ===== */
    const urlParams   = new URLSearchParams(window.location.search);
    const userId      = urlParams.get("id"); // trainer id whose profile we view
    const profileCard = document.getElementById("profileCard");
    // Action bar buttons (placed between cards)
    const btnBack        = document.getElementById("btnBack");
    const btnFav         = document.getElementById("btnFav");
    const btnShowReviews = document.getElementById("btnShowReviews");
    const favCountEl     = document.getElementById("favCount");

    const reportModal = document.getElementById("reportModal");
    const reportReasonsEl = document.getElementById("reportReasons");
    const reportForm = document.getElementById("reportForm");
    const reportDescription = document.getElementById("reportDescription");
    const cancelReportBtn = document.getElementById("cancelReport");

    let activeReport = null; // { targetType, targetId }

    const REVIEW_REPORT_REASONS = [
      { code: "spam", label: "Spam nebo reklama" },
      { code: "off_topic", label: "Nesouvisí s trenérem" },
      { code: "vulgar", label: "Urážlivý nebo vulgární obsah" },
      { code: "sexual", label: "Sexuální obsah" },
      { code: "violence", label: "Výhružky nebo násilí" },
      { code: "fake_review", label: "Nepravdivá recenze" },
      { code: "conflict_of_interest", label: "Střet zájmů" },
      { code: "gdpr_violation", label: "Obsahuje osobní údaje" }
    ];

    const TRAINER_REPORT_REASONS = [
      { code: "fake_profile", label: "Falešný profil" },
      { code: "impersonation", label: "Vydává se za jinou osobu" },
      { code: "stolen_photos", label: "Použité cizí / kradené fotografie" },
      { code: "misleading_info", label: "Zavádějící informace" },
      { code: "scam", label: "Podvodné jednání" },
      { code: "unlicensed", label: "Neoprávněné podnikání" },
      { code: "gdpr_violation", label: "Porušení GDPR (osobní údaje)" },
      { code: "terms_violation", label: "Porušení podmínek služby" }
    ];
    
    function isPublicTrainer(user) {
      if (!user || !user.status) return false;
      return user.status === "active" || user.status === "suspended";
    }

    function openReportModal(targetType, targetId) {
      activeReport = { targetType, targetId };

      const reasons =
        targetType === "trainer"
          ? TRAINER_REPORT_REASONS
          : REVIEW_REPORT_REASONS;

      reportReasonsEl.innerHTML = reasons.map(r => `
        <label>
          <input type="radio" name="reason" value="${r.code}" required>
          ${r.label}
        </label>
      `).join("");

      const title = reportModal.querySelector("h3");
      if (title) {
        title.textContent =
          targetType === "trainer"
            ? "Nahlásit trenéra"
            : "Nahlásit recenzi";
      }

      reportDescription.value = "";
      reportModal.classList.remove("hidden");
    }


    function closeReportModal() {
      activeReport = null;
      reportModal.classList.add("hidden");
    }

    cancelReportBtn.onclick = closeReportModal;
    reportModal.onclick = e => {
      if (e.target === reportModal) closeReportModal();
    };
    
    function locationText(loc) {
      if (!loc) return "";
      if (typeof loc === "string") return loc;
      const city   = (loc.city   || "").trim();
      const region = (loc.region || "").trim();
      return city && region ? `${city}, ${region}` : (city || region || "");
    }

    // Make the heart clickable even for guests → redirect to register
    if (btnFav) {
      btnFav.removeAttribute("disabled"); // just in case
      btnFav.addEventListener("click", () => {
        const u = auth.currentUser;
        if (!u) {
          toast("Pro ukládání do oblíbených se přihlaste.");
          window.location.href = "register.html";
        }
      });
    }

    // Hook static buttons
    if (btnBack) {
      btnBack.addEventListener("click", () => {
        if (history.length > 1) history.back();
        else window.location.href = "index.html"; // fallback list page
      });
    }
    if (btnShowReviews) {
      btnShowReviews.addEventListener("click", () => {
        document.getElementById("reviewsSection")?.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }

    // Deep-link to map page and center on this trainer
    const btnOpenOnMap = document.getElementById("btnOpenOnMap");
    if (btnOpenOnMap) {
      btnOpenOnMap.addEventListener("click", () => {
        if (!userId) return;
        const url = `mapa-treneru.html?u=${encodeURIComponent(userId)}`;
        window.location.href = url;
      });
    }

    function renderSocialLinks(socials = {}) {
      const platforms = {
        instagram: usernameOrUrl =>
          usernameOrUrl?.startsWith("http")
            ? usernameOrUrl
            : `https://instagram.com/${String(usernameOrUrl).replace(/^@/, "")}`,
        facebook: usernameOrUrl =>
          usernameOrUrl?.startsWith("http")
            ? usernameOrUrl
            : `https://facebook.com/${String(usernameOrUrl).replace(/^@/, "")}`,
        tiktok: usernameOrUrl =>
          usernameOrUrl?.startsWith("http")
            ? usernameOrUrl
            : `https://tiktok.com/@${String(usernameOrUrl).replace(/^@/, "")}`
      };

      let html = "";
      for (let key in platforms) {
        if (socials[key] && String(socials[key]).trim() !== "") {
          const link = platforms[key](socials[key]);
          const displayName = String(socials[key]).startsWith("http")
            ? socials[key]
            : `@${String(socials[key]).replace(/^@/, "")}`;
          html += `<a href="${link}" target="_blank" class="social-tag">${key} ${displayName}</a>`;
        }
      }
      return html || "<p>Žádné sociální sítě</p>";
    }

    // ===== Load trainer profile (UNCHANGED LOGIC) =====
    if (userId) {
      const userRef = ref(db, 'users/' + userId);
      get(userRef).then(snapshot => {
        if (snapshot.exists()) {
          const user = snapshot.val();
          // 🔐 STATUS GUARD
          if (!isPublicTrainer(user)) {
            profileCard.innerHTML = `
              <div class="profile-blocked">
                <h2>Profil není dostupný</h2>
                <p>Tento profil není veřejně dostupný.</p>
                <button class="action-btn action-btn--ghost" onclick="window.location.href='index.html'">
                  Zpět na seznam trenérů
                </button>
              </div>
            `;
            return;
          }
          const specializations = Array.isArray(user.specializations)
            ? user.specializations.join(', ')
            : (typeof user.specializations === 'string' ? user.specializations : '-');

          const languages = Array.isArray(user.languages)
            ? user.languages.join(', ')
            : (typeof user.languages === 'string' ? user.languages : '-');

          profileCard.innerHTML = `
            <div class="profile-container animate__animated animate__fadeIn animate__slow">
              <div class="profile-left">
                <img class="profile-avatar" src="${user.profilePicture || 'https://placehold.co/300x300?text=Profil'}" alt="Profilová fotka">
                <h2>${user.name || "Neznámý"} ${user.prijmeni || ""}</h2>
                <p><strong>📍 Lokalita:</strong> ${locationText(user.location) || "-"}</p>
                <p><strong>📞 Telefon:</strong> ${user.phone || "-"}</p>
                <p><strong>📧 Email:</strong> ${user.email || "-"}</p>
                <p><strong>🌐 Moje sociální sítě:</strong></p>
                <p> </p>
                <div class="socials-container">
                  ${renderSocialLinks({
                    instagram: user.instagram,
                    facebook: user.facebook,
                    tiktok: user.tiktok
                  })}
                </div>
                <p><strong>Galerie</strong></p>
                <div id="profileGallery" class="profile-gallery" aria-label="Galerie trenéra" data-owner-id="${user.uid || ''}"></div>
              </div>
              <div class="profile-right">
                <p class="bio-text"><strong>🧍‍♂️ O mně:</strong><br> ${user.bio || "-"}</p>
                <p><strong>💪 Specializace:</strong></p>
                <div class="tag-list">
                  ${(Array.isArray(user.specializations) ? user.specializations : (user.specializations || "").split(","))
                    .map(s => `<span class="tag">${String(s).trim()}</span>`).join("") || "-"}
                </div>
                
                <p><strong>🗣️ Jazyky:</strong></p>
                <div class="tag-list">
                  ${(Array.isArray(user.languages) ? user.languages : (user.languages || "").split(","))
                    .map(l => `<span class="tag">${String(l).trim()}</span>`).join("") || "-"}
                </div>

                <p><strong>🧠 Zkušenosti:</strong> ${user.experience || "-"} let</p>
                <p class="pricing-text"><strong>💰 Cenník:</strong><br> ${user.pricing || "-"}</p>
              </div>
            </div>
          `;
          // use whichever key holds gallery in your DB (I saw `gallery` in your DB screenshot)
          initProfileGallery(user.gallery || user._gallery || [], user.uid || userId);
        } else {
          profileCard.innerHTML = "<p>Uživatel nebyl nalezen.</p>";
        }
      }).catch(error => {
        profileCard.innerHTML = `<p>Chyba načítání: ${error.message}</p>`;
      });
    } else {
      profileCard.innerHTML = "<p>Chybí ID uživatele v URL.</p>";
    }

    (function(){
      const CLOUD = window.CLOUDINARY_CLOUD || "dkt3pdcbe"; // change to your cloud if different

      function thumbUrl(pid){ return `https://res.cloudinary.com/${CLOUD}/image/upload/c_fill,w_640,h_480,f_auto,q_auto/${encodeURIComponent(pid)}.jpg`; }
      function fullUrl(pid){ return `https://res.cloudinary.com/${CLOUD}/image/upload/f_auto,q_auto/${encodeURIComponent(pid)}.jpg`; }

      const observer = 'IntersectionObserver' in window ? new IntersectionObserver((entries, obs) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const img = e.target;
            const src = img.datasetSrc || img.dataset.src;
            if (src) { img.src = src; img.removeAttribute('data-src'); }
            obs.unobserve(img);
          }
        });
      }, { rootMargin: "200px 0px 200px 0px", threshold: 0.01 }) : null;

      window.initProfileGallery = function(gallery = [], ownerUid = "") {
        const container = document.getElementById('profileGallery');
        if (!container) return;
        const items = (gallery || []).map(it => {
          if (!it) return null;
          if (typeof it === 'string') return { publicId: it, url: null };
          return { publicId: it.publicId || it.public_id || null, url: it.url || it.secure_url || null };
        }).filter(Boolean);

        container.innerHTML = '';

        if (items.length === 0) {
          const ph = document.createElement('div');
          ph.className = 'thumb placeholder';
          ph.innerHTML = '<div>No photos</div>';
          container.appendChild(ph);
          return;
        }

        const visible = Math.min(4, items.length);
        for (let i=0;i<visible;i++){
          const it = items[i];
          const div = document.createElement('div');
          div.className = 'thumb';
          div.tabIndex = 0;
          div.dataset.index = i;

          const img = document.createElement('img');
          img.alt = `Foto ${i+1}`;
          img.loading = 'lazy';
          const src = it.publicId ? thumbUrl(it.publicId) : (it.url || '');
          img.dataset.src = src;
          if (observer) observer.observe(img);
          else img.src = src;

          div.appendChild(img);
          container.appendChild(div);

          div.addEventListener('click', ()=>openLightbox(i, items));
          div.addEventListener('keydown', e => { if (e.key === 'Enter') openLightbox(i, items); });
        }

        if (items.length > 4) {
          const index = 3;
          const last = container.children[index];
          last.classList.add('more');
          const overlay = document.createElement('div');
          overlay.className = 'count-overlay';
          overlay.textContent = `+${items.length - 3}`;
          last.appendChild(overlay);
          last.addEventListener('click', ()=>openLightbox(index, items));
        }
      };

      // LIGHTBOX
      const lb = document.createElement('div');
      lb.id = 'pg-lightbox';
      lb.innerHTML = `
        <div class="lb-inner" role="dialog" aria-modal="true" aria-label="Galerie">
          <button class="pg-lb-close" aria-label="Zavřít">✕</button>
          <button class="pg-lb-btn pg-lb-prev" aria-label="Předchozí">◀</button>
          <img id="pg-lb-img" src="" alt="Galerie obrázek" />
          <button class="pg-lb-btn pg-lb-next" aria-label="Další">▶</button>
        </div>
      `;
      document.body.appendChild(lb);
      const lbImg = lb.querySelector('#pg-lb-img');
      const closeBtn = lb.querySelector('.pg-lb-close');
      const prevBtn = lb.querySelector('.pg-lb-prev');
      const nextBtn = lb.querySelector('.pg-lb-next');
      let lbItems = [];
      let lbIndex = 0;

      function openLightbox(startIndex, items){
        lbItems = items || lbItems;
        lbIndex = Math.max(0, Math.min(startIndex, lbItems.length - 1));
        const cur = lbItems[lbIndex];
        lbImg.src = cur.publicId ? fullUrl(cur.publicId) : (cur.url || '');
        lb.classList.add('show');
        document.documentElement.style.overflow = 'hidden';
        closeBtn.focus();
      }
      function closeLightbox(){ lb.classList.remove('show'); lbImg.src = ''; document.documentElement.style.overflow = ''; }
      function showNext(){ lbIndex = (lbIndex + 1) % lbItems.length; openLightbox(lbIndex); }
      function showPrev(){ lbIndex = (lbIndex - 1 + lbItems.length) % lbItems.length; openLightbox(lbIndex); }

      closeBtn.addEventListener('click', closeLightbox);
      nextBtn.addEventListener('click', showNext);
      prevBtn.addEventListener('click', showPrev);
      document.addEventListener('keydown', (e)=>{
        if (!lb.classList.contains('show')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowRight') showNext();
        if (e.key === 'ArrowLeft') showPrev();
      });

      // touch swipe
      let startX = 0;
      lbImg.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
      lbImg.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (dx > 40) showPrev();
        if (dx < -40) showNext();
        startX = 0;
      });

    })();


    /* ====== REVIEW SYSTEM (edit + anonymous + verified) ====== */
    const reviewsSection      = document.getElementById("reviewsSection");
    const reviewsList         = document.getElementById("reviewsList");
    const reviewFormContainer = document.getElementById("reviewFormContainer");
    const reviewText          = document.getElementById("reviewText");
    const submitReview        = document.getElementById("submitReview");
    const reviewNotice        = document.getElementById("reviewNotice");
    const starRating          = document.getElementById("starRating");
    const reviewAnon          = document.getElementById("reviewAnon");
    let selectedRating = 0;
    let currentUserId = null;
    let editMode = false;          // if true, we’re editing our existing review
    let originalCreatedAt = null;  // preserve createdAt on edit
    
    // --- tiny toast (no alert) ---
    const toastEl = document.getElementById("toast");
    function toast(msg){
      if(!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(()=> toastEl.classList.remove("show"), 2200);
    }

    // ===== Robust Czech profanity check (client-only) =====
    // 1) Try to load bad-words-cz from multiple CDNs
    // 2) If all fail, use a local Czech heuristic (stems + accent/leet normalization)

    let czFilter = null;

    async function loadCzFilter() {
      const urls = [
        "https://esm.sh/bad-words-cz@1.0.4",
        "https://cdn.skypack.dev/bad-words-cz@1.0.4",
        "https://jspm.dev/bad-words-cz@1.0.4"
      ];
      for (const u of urls) {
        try {
          const mod = await import(u);
          const Filter = mod.default || mod; // some CDNs export default
          return new Filter();
        } catch (_) {}
      }
      return null;
    }

    // light Czech normalization (remove diacritics + basic leetspeak)
    function normalizeCz(s) {
      const map = {
        á:"a", č:"c", ď:"d", é:"e", ě:"e", í:"i", ň:"n",
        ó:"o", ř:"r", š:"s", ť:"t", ú:"u", ů:"u", ý:"y", ž:"z",
        Á:"a", Č:"c", Ď:"d", É:"e", Ě:"e", Í:"i", Ň:"n",
        Ó:"o", Ř:"r", Š:"s", Ť:"t", Ú:"u", Ů:"u", Ý:"y", Ž:"z"
      };
      let t = String(s || "").replace(/./gu, ch => map[ch] ?? ch).toLowerCase();
      t = t
        .replace(/[@]/g,"a").replace(/\$/g,"s")
        .replace(/0/g,"o").replace(/1/g,"i").replace(/3/g,"e")
        .replace(/4/g,"a").replace(/5/g,"s").replace(/7/g,"t");
      // collapse non-letters to spaces
      t = t.replace(/[^a-z0-9]+/g, " ");
      return t;
    }

    // compact Czech stems to catch inflections
    const CZ_STEMS = [
      // core vulgar stems (normalized, no diacritics)
      "kurv","zkurv","prokurv","dojeb","pojeb","vyjeb","najeb","zajeb","jeb",
      "mrdat","mrd","mrdk","promrd","vymrd","odmrd","zasmrd",
      "prc","prcat","vyprc","sprc","opr","naprc",
      "suk","sukat","presuk","vosuk","zasuk",
      "pic","pico","pica","pice","pici","picov","picus","pich",
      "kund","kunda","kundi","kundov","kundis",
      "curak","curaci","curack",
      "kokot","kokota","kokotin","kokotsk",
      "zmrd","zmrdit","zmrde","zmrds",
      "srac","srack","srat","posrat","nasrat","vysrat","osrat",
      "zasran","posran","usran","presr",
      "hovn","prdel","vprdel","doprdel",
      "chcan","chcat","pochcat","nachcat","ochcan",
      "pytelkouli","koule","koure","vykour",
      "cecky","kozy","kozat",
      "prsa","prciny",
      "krava","svine","prasat","prase","parchant","parch",
      "debil","debiln","idiot","blbec","blbka","blbost","magor","kreten","kripl","retard",
      "sprostak","sprostarn",
      "fuck","fucking","shit","bullshit","bitch","asshole","dick","cunt","bastard","niga","niger",
    ];

    function czechHeuristic(text) {
      const t = normalizeCz(text);
      return CZ_STEMS.some(stem => t.includes(stem));
    }

    async function containsBadWords(text) {
      try {
        if (!czFilter) czFilter = await loadCzFilter();
        if (czFilter) return czFilter.isProfane(String(text || ""));
      } catch (e) {
        console.warn("CZ filter CDN failed, using heuristic:", e);
      }
      return czechHeuristic(text);
    }

    // get display name from your DB (users -> trainers, app-users -> normal users)
    async function fetchDisplayName(uid){
      try{
        const s1 = await get(ref(db, `users/${uid}`));
        if (s1.exists() && s1.val()?.name) return s1.val().name;
      }catch{}
      try{
        const s2 = await get(ref(db, `app-users/${uid}`));
        if (s2.exists() && s2.val()?.name) return s2.val().name;
      }catch{}
      const u = auth.currentUser;
      return (u && (u.displayName || u.email?.split("@")[0])) || "Uživatel";
    }

    // stars (picker)
    if (starRating){
      starRating.querySelectorAll("span").forEach(star=>{
        star.addEventListener("click", ()=>{
          selectedRating = parseInt(star.dataset.value);
          starRating.querySelectorAll("span").forEach(s=>{
            s.classList.toggle("active", parseInt(s.dataset.value) <= selectedRating);
          });
        });
      });
    }

    function reviewCardHTML(r, isMine){
      const stars = Math.max(1, Math.min(5, Number(r.rating)||0));
      const badge = r.verified
        ? '<span class="badge badge--ok" title="Ověřená recenze">✔ Ověřeno</span>'
        : '<span class="badge badge--pending" title="Čeká na ověření">Neověřeno</span>';

      return `
        <div class="review-top">
          <div class="review-stars">${"★".repeat(stars)}${"☆".repeat(5 - stars)}</div>
          ${badge}
          ${isMine ? `
            <div class="review-actions-inline">
              <button class="btn-plain edit-review" type="button">Upravit</button>
              <button class="btn-plain delete-review" type="button">Smazat</button>
            </div>
          ` : ""}
        </div>
        <p class="review-text">"${r.text}"</p>
        <p class="review-meta">— ${r.authorName || "Uživatel"}, ${new Date(r.createdAt).toLocaleDateString("cs-CZ")}</p>
      `;
    }

    // load all reviews, render edit button for your own review
    function loadReviews(){
      const rRef = ref(db, `reviews/${userId}`);
      onValue(rRef, snap=>{
        reviewsList.innerHTML = "";
        if (!snap.exists()){
          reviewsList.innerHTML = "<p>Zatím žádné recenze.</p>";
          return;
        }
        const all = snap.val();

        // === put my review first, then verified, then the rest (newest first within each group) ===
        const allEntries = Object.entries(all);

        // split mine vs others
        let myEntry = null;
        const others = [];
        for (const pair of allEntries) {
          if (currentUserId && pair[0] === currentUserId) myEntry = pair;
          else others.push(pair);
        }

        // sort helper for others: verified first, then newest first
        const sortByVerifiedThenNew = ([, a], [, b]) => {
          const vDiff = (b?.verified === true) - (a?.verified === true); // true first
          if (vDiff) return vDiff;
          return (b?.createdAt || 0) - (a?.createdAt || 0);              // newer first
        };

        // final order
        others.sort(sortByVerifiedThenNew);
        const entries = myEntry ? [myEntry, ...others] : others;

        // render in sorted order
        entries.forEach(([uid, r]) => {
          const card = document.createElement("div");
          card.className = "review-card";
          card.innerHTML = reviewCardHTML(r, currentUserId && uid === currentUserId);

          // dataset for reporting
          card.dataset.reviewerId = uid;
          card.dataset.text       = r.text || "";
          card.dataset.rating     = Number(r.rating) || 0;
          card.dataset.createdAt  = r.createdAt || 0;
          card.dataset.authorName = r.authorName || "Uživatel";

          // report button (only for others' reviews)
          if (currentUserId && currentUserId !== uid) {
            const actions   = document.createElement("div");
            const reportBtn = document.createElement("button");
            actions.className = "review-actions";
            reportBtn.className = "report-btn";
            reportBtn.type = "button";
            reportBtn.textContent = "Nahlásit";
            reportBtn.dataset.rid = uid;
            actions.appendChild(reportBtn);
            card.appendChild(actions);
          }

          // hook edit button for my own review
          if (currentUserId && uid === currentUserId) {
            const btn = card.querySelector(".edit-review");
            if (btn) {
              btn.addEventListener("click", () => {
                editMode = true;
                selectedRating = Number(r.rating) || 0;
                starRating?.querySelectorAll("span").forEach(s => {
                  s.classList.toggle("active", parseInt(s.dataset.value) <= selectedRating);
                });
                reviewText.value = r.text || "";
                reviewAnon.checked = !!r.anonymous;
                originalCreatedAt = r.createdAt || Date.now();
                reviewFormContainer.style.display = "block";
                reviewNotice.textContent = "Upravujete svou recenzi.";
                submitReview.textContent = "Uložit změny";
              });
            }
          }
          reviewsList.appendChild(card);
        });
      }, err=>{
        console.error("Reviews read denied:", err);
        reviewsList.innerHTML = "<p>Nepodařilo se načíst recenze (práva k databázi).</p>";
      });
    }
    loadReviews();

    // report button on review opens report window
    reviewsList.addEventListener("click", async (e) => {
      const btn = e.target.closest(".report-btn");
      if (!btn) return;

      if (!auth.currentUser) {
        toast("Pro nahlášení se musíte přihlásit.");
        return;
      }

      const reviewId = btn.dataset.rid;
      if (!reviewId) return;

      const user = auth.currentUser;
      if (!user) return;

      try {
        const alreadyRef = ref(db, `reportsByUser/${user.uid}/review/${reviewId}`);
        const snap = await get(alreadyRef);

        if (snap.exists()) {
          toast("Tuto recenzi jste již nahlásil.");
          return;
        }

        openReportModal("review", reviewId);

      } catch (err) {
        console.error("Report precheck failed:", err);
        toast("Nelze ověřit stav nahlášení.");
      }
    });
    const btnReportTrainer = document.getElementById("btnReportTrainer");

    if (btnReportTrainer) {
      btnReportTrainer.addEventListener("click", async () => {
        const user = auth.currentUser;

        if (!user) {
          toast("Pro nahlášení trenéra se musíte přihlásit.");
          return;
        }

        // Prevent self-report
        if (user.uid === userId) {
          toast("Nemůžete nahlásit sami sebe.");
          return;
        }

        try {
          const alreadyRef = ref(
            db,
            `reportsByUser/${user.uid}/trainer/${userId}`
          );
          const snap = await get(alreadyRef);

          if (snap.exists()) {
            toast("Tento profil jste již nahlásil.");
            return;
          }

          openReportModal("trainer", userId);

        } catch (err) {
          console.error("Trainer report precheck failed:", err);
          toast("Nelze ověřit stav nahlášení.");
        }
      });
    }

    reportForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const submitBtn = reportForm.querySelector('button[type="submit"]');
      if (submitBtn) submitBtn.disabled = true;
      if (!activeReport) return;
      const user = auth.currentUser;
      if (!user) return;

      const reason = reportForm.reason.value;
      const description = reportDescription.value.trim();

      const now = Date.now();
      const reportId = crypto.randomUUID();

      const data = {
        targetType: activeReport.targetType,
        targetId: activeReport.targetId,

        reporterUid: user.uid,

        reason,
        description: description || "",

        status: "open",
        resolution: null,

        createdAt: now,
        resolvedAt: null,
        expiresAt: now + 1000 * 60 * 60 * 24 * 365 // 12 months
      };

      try {
        await set(ref(db, `reports/${reportId}`), data);
        await set(
          ref(db, `reportsByUser/${user.uid}/${activeReport.targetType}/${activeReport.targetId}`),
          { createdAt: now }
        );
        toast("Nahlášení bylo odesláno.");
        closeReportModal();
      } catch (err) {
        console.error(err);
        if (submitBtn) submitBtn.disabled = false;
        toast("Nepodařilo se odeslat nahlášení.");
      }
    });

    // DELETE my own review
    reviewsList.addEventListener("click", async (e) => {
      const delBtn = e.target.closest(".delete-review");
      if (!delBtn) return;

      const user = auth.currentUser;
      if (!user) { toast("Pro smazání recenze se přihlaste."); return; }
      if (user.uid !== currentUserId) return; // safety

      const myReviewRef = ref(db, `reviews/${userId}/${user.uid}`);
      const myReportThreadRef = ref(db, `reviewReportsQueue/${userId}/${user.uid}`);

      if (!confirm("Opravdu chcete svou recenzi smazat?")) return;

      // 1) Hard requirement: delete the review (alert only if THIS fails)
      try {
        await remove(myReviewRef);
        toast("Recenze byla smazána.");
      } catch (err) {
        console.error("Delete review failed:", err);
        alert("Nepodařilo se smazat recenzi (práva k databázi).");
        return; // stop here; main action failed
      }

      // 2) Best-effort cleanup: try to remove any reports for this review (silence errors)
      try {
        await remove(myReportThreadRef);
      } catch (err) {
        console.debug("Report thread cleanup skipped:", err?.message || err);
      }

      // 3) Refresh the page so the list updates immediately
      setTimeout(() => location.reload(), 300);
    });


    /* ===== Favorites: init + toggle ===== */
    let favOn = false; // local UI state for the current viewer

    function setFavUI(isOn) {
      favOn = !!isOn;
      if (btnFav) {
        btnFav.classList.toggle("is-on", favOn);
        btnFav.setAttribute("aria-pressed", favOn ? "true" : "false");
        // optional text tweak (if you want): btnFav.querySelector(".label")?.textContent = favOn ? "Uloženo" : "Do oblíbených";
      }
    }

    async function initFavState(viewerUid) {
      if (!userId || !btnFav) return; // viewed trainer id from URL

      // ⛔ Block self-favorite
      if (viewerUid === userId) {
        setFavUI(false);
        btnFav.disabled = true;
        btnFav.setAttribute("aria-disabled", "true");
        btnFav.title = "Nemůžete uložit sebe do oblíbených";
        return; // do not attach the toggle handler
      } else {
        btnFav.disabled = false;
        btnFav.removeAttribute("aria-disabled");
        btnFav.title = "Uložit trenéra do oblíbených";
      }

      // live count
      onValue(ref(db, `favoriteCounts/${userId}`), (snap) => {
        const n = snap.exists() ? Number(snap.val()) || 0 : 0;
        if (favCountEl) favCountEl.textContent = String(n);
      });

      // my current state
      try {
        const mine = await get(ref(db, `favoritesByUser/${viewerUid}/${userId}`));
        setFavUI(mine.exists());
      } catch {}

      // click to toggle (allow multiple toggles without refresh)
      btnFav.onclick = async () => {
        const u = auth.currentUser;
        if (!u) return; // safety (guest handler above will redirect)

        try {
          const myRef = ref(db, `favoritesByUser/${u.uid}/${userId}`);
          const newOn = !favOn;

          if (newOn) { await set(myRef, { addedAt: Date.now() }); }
          else { await set(myRef, null); }

          // adjust global count atomically
          const countRef = ref(db, `favoriteCounts/${userId}`);
          await runTransaction(countRef, (cur) => {
            const n = typeof cur === "number" ? cur : 0;
            return newOn ? n + 1 : Math.max(0, n - 1);
          });

          setFavUI(newOn);
          toast(newOn ? "Přidáno do oblíbených." : "Odebráno z oblíbených.");
        } catch (e) {
          console.error("Fav toggle failed:", e);
          toast("Nepodařilo se upravit oblíbené.");
        }
      };
    }

    // auth gate: self-review blocked, one review per user; allow editing
    onAuthStateChanged(auth, async(user)=>{
      if (user){
        currentUserId = user.uid;
        await initFavState(user.uid);

        if (user.uid === userId){
          reviewNotice.textContent = "Nemůžete psát recenzi na sebe.";
          return;
        }

        // check if I already have a review (to decide create vs edit default state)
        try{
          const mySnap = await get(ref(db, `reviews/${userId}/${user.uid}`));
          if (mySnap.exists()){
            // user can edit; form hidden by default until they click "Upravit"
            reviewNotice.textContent = "Recenzi můžete upravit pomocí tlačítka \"Upravit\".";
            submitReview.textContent = "Odeslat recenzi"; // default label (will change in edit)
          }else{
            // first time → show form
            reviewFormContainer.style.display = "block";
            submitReview.textContent = "Odeslat recenzi";
          }
        }catch(e){
          console.error("Check my review failed:", e);
          reviewNotice.textContent = "Nelze ověřit vaše recenze (práva k databázi).";
          return;
        }

        // submit (create or update)
        submitReview.onclick = async ()=>{
          const MAX_REVIEW_CHARS = 1000;
          const text = (reviewText?.value || "").trim();
          if (text.length > MAX_REVIEW_CHARS){ 
            toast(`Maximální délka recenze je ${MAX_REVIEW_CHARS} znaků.`); 
            return; 
          }
          if (!text){ toast("Recenze nemůže být prázdná."); return; }
          if (!selectedRating){ toast("Vyberte hodnocení (1–5 hvězdiček)."); return; }
          if (await containsBadWords(text)){ toast("Recenze obsahuje zakázaná slova."); return; }

          // name logic: if anonymous checked -> "Uživatel", else resolved name from DB
          const displayName = reviewAnon.checked ? "Uživatel" : await fetchDisplayName(user.uid);

          // build data
          const now = Date.now();
          const path = ref(db, `reviews/${userId}/${user.uid}`);

          // on create → verified always false
          // on edit   → preserve verified and createdAt
          let verified = false;
          let createdAt = now;

          if (editMode){
            try{
              const cur = await get(path);
              if (cur.exists()){
                const curVal = cur.val();
                verified = !!curVal.verified;        // keep whatever it was (user can't change it)
                createdAt = curVal.createdAt || now; // preserve original timestamp
              }
            }catch{}
          }

          const reviewData = {
            text,
            rating: selectedRating,
            authorId: user.uid,
            authorName: displayName,
            anonymous: !!reviewAnon.checked,
            verified,             // stays as is; initially false on create
            createdAt
          };

          try{
            await set(path, reviewData);
            // reset UI
            editMode = false;
            reviewText.value = "";
            reviewAnon.checked = false;
            selectedRating = 0;
            starRating?.querySelectorAll("span").forEach(s=>s.classList.remove("active"));
            reviewNotice.textContent = "Recenze byla uložena.";
            reviewFormContainer.style.display = "none";
            submitReview.textContent = "Odeslat recenzi";
          }catch(e){
            console.error("Write review denied:", e);
            alert("Nepodařilo se uložit recenzi (práva k databázi).");
          }
        };

      }else{
        currentUserId = null;
        reviewNotice.textContent = "Pro psaní recenze se musíte přihlásit.";
        reviewFormContainer.style.display = "none";
        reviewsSection.addEventListener("click", ()=>{ window.location.href = "register.html"; }, { once:true });
        setFavUI(false);
      }
    });
  </script>

  <script type="module" src="auth-navbar.js"></script>
</body>
